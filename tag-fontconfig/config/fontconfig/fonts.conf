<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<fontconfig>
  <dir>~/.fonts</dir>
  <match>
    <test name="family">
      <string>sans-serif</string>
    </test>
    <edit binding="strong" mode="prepend" name="family">
      <string>SF Pro Text</string>
      <string>PingFang SC</string>
      <string>Source Han Sans CN</string>
    </edit>
  </match>
  <match>
    <test name="family">
      <string>serif</string>
    </test>
    <edit binding="strong" mode="prepend" name="family">
      <string>Cambria</string>
    </edit>
  </match>
  <match>
    <test name="family">
      <string>monospace</string>
    </test>
    <edit binding="strong" mode="prepend" name="family">
      <string>Consolas</string>
      <string>Iosevka</string>
      <string>SF Mono</string>
      <string>PingFang SC</string>
    </edit>
  </match>
  <match>
    <test name="family">
      <string>sans-serif</string>
    </test>
    <test name="lang">
      <string>zh-cn</string>
    </test>
    <edit binding="strong" mode="prepend" name="family">
      <string>PingFang SC</string>
    </edit>
  </match>
  <match>
    <test name="family">
      <string>serif</string>
    </test>
    <test name="lang">
      <string>zh-cn</string>
    </test>
    <edit binding="strong" mode="prepend" name="family">
      <string>Source Han Serif CN</string>
    </edit>
  </match>
  <match>
    <test name="family">
      <string>monospace</string>
    </test>
    <test name="lang">
      <string>zh-cn</string>
    </test>
    <edit binding="strong" mode="prepend" name="family">
      <string>PingFang SC</string>
    </edit>
  </match>
  <match>
    <test name="family">
      <string>sans-serif</string>
    </test>
    <test name="lang">
      <string>zh-tw</string>
    </test>
    <edit binding="strong" mode="prepend" name="family">
      <string>Microsoft JhengHei</string>
    </edit>
  </match>
  <match>
    <test name="family">
      <string>serif</string>
    </test>
    <test name="lang">
      <string>zh-tw</string>
    </test>
    <edit binding="strong" mode="prepend" name="family">
      <string>Source Han Serif TW</string>
    </edit>
  </match>
  <match>
    <test name="family">
      <string>sans-serif</string>
    </test>
    <test name="lang">
      <string>ja</string>
    </test>
    <edit binding="strong" mode="prepend" name="family">
      <string>Yu Gothic</string>
    </edit>
  </match>
  <match>
    <test name="family">
      <string>serif</string>
    </test>
    <test name="lang">
      <string>ja</string>
    </test>
    <edit binding="strong" mode="prepend" name="family">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Blobmoji</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>Blobmoji</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Blobmoji</family>
    </prefer>
  </alias>
  <alias>
    <family>Open Sans</family>
    <prefer>
      <family>SF Pro Text</family>
    </prefer>
  </alias>
  <alias>
    <family>Open Sans</family>
    <prefer>
      <family>Microsoft YaHei UI</family>
    </prefer>
  </alias>
  <match target="font">
    <edit mode="assign" name="antialias">
      <bool>true</bool>
    </edit>
  </match>
  <match target="font">
    <edit mode="assign" name="hinting">
      <bool>true</bool>
    </edit>
  </match>
  <match target="font">
    <edit mode="assign" name="hintstyle">
      <const>hintnone</const>
    </edit>
  </match>
  <match target="font">
    <edit mode="assign" name="rgba">
      <const>rgb</const>
    </edit>
  </match>
  <match target="font">
    <edit mode="assign" name="lcdfilter">
      <const>lcddefault</const>
    </edit>
  </match>
  <match target="font">
    <edit mode="assign" name="embeddedbitmap">
      <bool>false</bool>
    </edit>
  </match>
</fontconfig>
